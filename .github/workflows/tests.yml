name: Tests
on:
  pull_request:
  push:
      branches: [ main ]
    
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true


jobs:
  linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hebe-tester .

      - name: Configure with preset
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace hebe-tester \
            cmake --preset linux-arm64-debug-tests

      - name: Build with preset
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace hebe-tester \
            cmake --build --preset linux-arm64-debug-tests

      - name: Perform the tests
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace hebe-tester \
            ctest --preset linux-arm64-tests --output-on-failure

  macos-arm64:
    name: macOS ARM64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install ninja llvm@21 bison@3.8 flex

      - name: Configure CMake
        run: |
          cmake --preset macos-arm64-debug-tests \
          -DCMAKE_C_COMPILER=/opt/homebrew/opt/llvm@21/bin/clang \
          -DCMAKE_CXX_COMPILER=/opt/homebrew/opt/llvm@21/bin/clang++ \
          -DLLVM_CONFIG_EXECUTABLE=/opt/homebrew/opt/llvm@21/bin/llvm-config

      - name: Build
        run: cmake --build --preset macos-arm64-debug-tests

      - name: Perform the tests
        run: ctest --preset macos-arm64-tests --output-on-failure
